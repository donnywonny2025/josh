<!DOCTYPE html>
<html>
<head>
    <title>Timeline Viewer</title>
    <style>
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            margin: 0; 
            padding: 40px; 
        }
        h1 { margin-top: 0; font-size: 2.5rem; color: #fff; letter-spacing: 1px; }
        .folder-header { 
            font-size: 1.8rem; 
            border-bottom: 2px solid #1f1f1f; 
            margin-top: 60px; 
            padding-bottom: 15px; 
            color: #0ea5e9; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .photo-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 25px; 
            margin-top: 30px; 
        }
        .photo-card { 
            background: #111; 
            border: 1px solid #222;
            padding: 15px; 
            border-radius: 12px; 
            width: 320px; 
            transition: transform 0.2s ease;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            border-color: #333;
        }
        .photo-card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 6px; 
            margin-bottom: 15px;
        }
        .desc { 
            font-size: 0.95rem; 
            color: #e2e8f0; 
            line-height: 1.4;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <h1>CHRONOLOGICAL TIMELINE REVIEW</h1>
    <p style="color: #888; font-size: 1.1rem;">All 536 photos grouped by folder sequence and parsed through the intelligence engine.</p>
    <div id="content"></div>
    <script>
        fetch('master_photo_db.json?t=' + Date.now()).then(r=>r.json()).then(db => {
            const order = [
                'Baby & toddler Josh', 'Josh school years', 'Josh - Family', 'Josh with Kerrs', 
                'Ben and Josh', 'Josh and Friends', 'Josh - Military', 'Josh & Linsey', 
                'Josh’s places and travel', 'Just Josh', 'save a place for me', 'Phyllis Old Photos'
            ];
            
            let grouped = {};
            order.forEach(o => grouped[o] = []);
            
            Object.keys(db).forEach(path => {
                let parts = path.split('/');
                let folder = parts[parts.length-2];
                if(grouped[folder]) {
                    grouped[folder].push({path: path, desc: db[path].description});
                } else {
                    if(!grouped['Other']) grouped['Other'] = [];
                    grouped['Other'].push({path: path, desc: db[path].description});
                }
            });
            
            let html = '';
            for(let folder in grouped) {
                if(grouped[folder].length === 0) continue;
                html += `<div class="folder-header">${folder} <span style="color:#444;font-size:1rem;margin-left:10px;">(${grouped[folder].length} photos)</span></div>`;
                html += `<div class="photo-grid">`;
                
                // sort within folder alphabetically for sequence order
                grouped[folder].sort((a,b) => a.path.localeCompare(b.path));
                
                grouped[folder].forEach(p => {
                    let relPath = p.path.replace("/Volumes/Extreme SSD/JOSH/", "../");
                    html += `
                    <div class="photo-card">
                        <img loading="lazy" src="${relPath}">
                        <div class="desc">"${p.desc}"</div>
                    </div>`;
                });
                html += `</div>`;
            }
            document.getElementById('content').innerHTML = html;
        });
    </script>
</body>
</html>
