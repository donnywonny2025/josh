<!DOCTYPE html>
<html>
<head>
    <title>Live AI Deep Vision Monitor</title>
    <style>
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f1f1f;
            background: #0a0a0a;
            z-index: 10;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .pulse { 
            width: 12px; height: 12px; border-radius: 50%; background: #ef4444; 
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }

        h1 { margin: 0; font-size: 1.4rem; font-weight: 600; letter-spacing: 0.5px; }
        
        .stats {
            display: flex;
            gap: 40px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .stat-val { font-size: 1.8rem; font-weight: 700; color: #fff; }
        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .main-content {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 85px);
        }

        .image-panel {
            flex: 2;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .current-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease;
        }

        .data-panel {
            flex: 1;
            background: #0a0a0a;
            border-left: 1px solid #1f1f1f;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .data-label {
            color: #0ea5e9;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .age-badge {
            display: inline-block;
            background: #10b981;
            color: #000;
            font-size: 3rem;
            font-weight: 800;
            padding: 10px 25px;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .description {
            font-size: 1.6rem;
            line-height: 1.4;
            color: #e2e8f0;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .file-path {
            font-family: monospace;
            color: #64748b;
            font-size: 0.9rem;
            word-break: break-all;
            padding: 15px;
            background: #111;
            border-radius: 6px;
            border: 1px solid #222;
        }

        .scanning-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            z-index: 100;
            display: none;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <div class="pulse"></div>
            <h1>LIVE SCAN ENGINE</h1>
        </div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-val" id="total_count">0 <span style="color:#444;font-size:1.2rem">/ 513</span></div>
                <div class="stat-label">Total Completed</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="time_left" style="color:#0ea5e9">--</div>
                <div class="stat-label">Minutes Remaining</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="image-panel">
            <img id="main_image" class="current-image" src="" alt="Waiting for next image...">
        </div>
        <div class="data-panel">
            <div class="data-label">AI Estimated Age</div>
            <div class="age-badge" id="main_age">--</div>
            
            <div class="data-label">Deep Vision Context</div>
            <div class="description" id="main_desc">Waiting for AI...</div>
            
            <div class="data-label">Source File</div>
            <div class="file-path" id="main_path">--</div>
        </div>
    </div>

    <script>
        let lastCount = 0;

        async function fetchLatest() {
            try {
                const response = await fetch('master_photo_db.json?t=' + Date.now());
                const data = await response.json();
                
                const entries = Object.entries(data);
                const count = entries.length;
                
                // Update stats
                document.getElementById('total_count').innerHTML = count + ' <span style="color:#444;font-size:1.2rem">/ 513</span>';
                
                const remaining = 513 - count;
                const minutesLeft = (remaining * 4.5 / 60).toFixed(1);
                document.getElementById('time_left').innerText = Math.max(0, minutesLeft) + " min";

                // Only update the main UI if a NEW photo has been processed
                if (count > lastCount && count > 0) {
                    lastCount = count;
                    
                    // The newest photo is the last key added to the JSON
                    const latestEntry = entries[count - 1];
                    const path = latestEntry[0];
                    const info = latestEntry[1];
                    
                    const relativePath = path.replace("/Volumes/Extreme SSD/JOSH/", "../");
                    
                    // Update DOM
                    const imgElement = document.getElementById('main_image');
                    
                    // Add a tiny fade effect
                    imgElement.style.opacity = '0.5';
                    setTimeout(() => {
                        imgElement.src = relativePath;
                        imgElement.style.opacity = '1';
                    }, 150);

                    document.getElementById('main_age').innerText = info.estimated_age;
                    document.getElementById('main_desc').innerText = '"' + info.description + '"';
                    document.getElementById('main_path').innerText = path.split('/').pop();
                }
                
            } catch (err) {
                console.log("Waiting for data...");
            }
        }

        // Fetch immediately, then every 2 seconds
        fetchLatest();
        setInterval(fetchLatest, 2000);
    </script>
</body>
</html>
