<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Record Title Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Montserrat:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #111;
        }

        #capture-area {
            width: 1024px;
            height: 1024px;
            background-image: url('file:///Users/jeffkerr/.gemini/antigravity-ide/brain/e05efdc0-ee5c-4503-bbb2-79ae7db0a034/modern_topdown_vinyl_mockup_1783403706231.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .label {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background-color: #e8e6e1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #1a1a1a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15), 0 0 10px rgba(0,0,0,0.5);
        }

        /* Highly realistic center hole with physical spindle */
        .hole-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* The hole punched in the paper */
        .paper-hole {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #050505;
            position: absolute;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.9), 0 1px 1px rgba(255,255,255,0.4);
            z-index: 10;
        }

        /* The silver metal spindle sticking through */
        .spindle {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f0f0f0 0%, #a0a0a0 40%, #333 80%);
            position: absolute;
            z-index: 20;
            box-shadow: 2px 2px 3px rgba(0,0,0,0.8);
        }

        /* Typography */
        .title-main {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 2px;
            margin-bottom: 8px;
            width: 90%;
            color: #111;
        }

        .title-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 5px;
            margin-bottom: 45px; /* Space for spindle */
            color: #333;
        }

        .dates {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            margin-top: 45px; /* Space below spindle */
            text-align: center;
            line-height: 1.6;
            color: #222;
        }

        .easter-egg {
            position: absolute;
            bottom: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 6px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
            width: 80%;
            color: #555;
        }

    </style>
</head>
<body>
    <div id="capture-area">
        <div class="label">
            
            <div class="title-main">A BOND BETWEEN BROTHERS</div>
            <div class="title-sub">BEN & JOSH</div>
            
            <div class="hole-container">
                <div class="paper-hole"></div>
                <div class="spindle"></div>
            </div>
            
            <div class="dates">
                JOSH<br>
                JULY 8, 1982 &mdash; JAN 20, 2026
            </div>

            <div class="easter-egg">
                REST TOGETHER. WE WILL SEE YOU BOTH AGAIN.
            </div>

        </div>
    </div>
</body>
</html>
