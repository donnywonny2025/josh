<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josh Memorial — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#000; color:#e0e0e8; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* NAV */
.nav { background:#111118; border-bottom:1px solid #222; padding:6px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; z-index:10; }
.nav a { color:#888; text-decoration:none; font-size:12px; font-weight:500; padding:5px 12px; border-radius:6px; border:1px solid transparent; }
.nav a:hover { color:#ccc; background:#1a1a22; }
.nav a.active { color:#4a9eff; background:rgba(74,158,255,0.1); border-color:rgba(74,158,255,0.2); }
.nav .title { font-size:14px; font-weight:700; color:#e0e0e8; margin-right:auto; }
.nav select { background:#1a1a22; border:1px solid #333; color:#ccc; padding:4px 8px; border-radius:4px; font-size:11px; font-family:inherit; }
.nav .btn { padding:4px 10px; border-radius:6px; border:1px solid #333; background:#1a1a22; color:#ccc; font-size:11px; cursor:pointer; font-family:inherit; }
.nav .btn:hover { background:#252530; }

/* DISPLAY */
.display { flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#000; }
.display .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; transition:opacity 1s ease; }
.display .slide img { max-width:90%; max-height:90%; object-fit:contain; }
.display .slide.active { opacity:1; z-index:2; }
.display .slide.hidden { opacity:0; z-index:1; }

/* KEN BURNS PUSH */
@keyframes pushIn {
  from { transform: scale(1.0); }
  to { transform: scale(1.05); }
}
.display .slide.active.push img { animation: pushIn 10s linear forwards; }

/* SAFE MARGINS */
.safe-margins { position:absolute; inset:0; pointer-events:none; z-index:99; display:none; }
.safe-margins.active { display:block; }
.safe-margins .action-safe { position:absolute; inset:5%; border:1px solid rgba(255,0,0,0.5); }
.safe-margins .title-safe { position:absolute; inset:10%; border:1px solid rgba(255,255,0,0.5); }

.display .empty { color:#444; text-align:center; }
.display .empty .icon { font-size:48px; margin-bottom:12px; }

/* Click zones */
.display .zone-left, .display .zone-right { position:absolute; top:0; bottom:80px; width:15%; z-index:5; cursor:pointer; }
.display .zone-left { left:0; }
.display .zone-right { right:0; }
.display .zone-left:hover, .display .zone-right:hover { background:rgba(255,255,255,0.02); }

/* Slide info overlay */
.slide-label { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); color:#e0e0e8; font-size:12px; font-weight:600; z-index:5; background:rgba(0,0,0,0.7); padding:6px 16px; border-radius:12px; font-variant-numeric:tabular-nums; }

/* CONTROLS */
.controls { background:#0a0a0f; border-top:1px solid #222; padding:12px 24px; display:flex; flex-direction:column; gap:8px; flex-shrink:0; z-index:10; }

.controls-row { display:flex; align-items:center; gap:12px; }

.progress-bar { flex:1; height:6px; background:#1a1a22; border-radius:3px; cursor:pointer; position:relative; overflow:hidden; }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg, #4a9eff, #8b5cf6); border-radius:3px; }

.ctrl-btn { background:none; border:1px solid #333; color:#ccc; cursor:pointer; font-size:16px; padding:6px 12px; border-radius:6px; font-family:inherit; transition:all 0.15s; }
.ctrl-btn:hover { background:#1a1a22; border-color:#555; color:#fff; }
.ctrl-btn.play { font-size:20px; padding:8px 16px; background:rgba(74,158,255,0.1); border-color:rgba(74,158,255,0.3); color:#4a9eff; }
.ctrl-btn.play:hover { background:rgba(74,158,255,0.2); }

.ctrl-info { font-size:12px; color:#888; min-width:80px; }
.ctrl-time { font-size:13px; color:#aaa; font-variant-numeric:tabular-nums; min-width:100px; text-align:right; }

.controls-row2 { display:flex; align-items:center; gap:16px; justify-content:center; }
.controls-row2 label { font-size:11px; color:#555; display:flex; align-items:center; gap:4px; cursor:pointer; }
.controls-row2 input[type=range] { width:80px; accent-color:#4a9eff; }
.controls-row2 .speed-val { font-size:11px; color:#888; min-width:30px; }
.controls-row2 .section-name { font-size:12px; color:#8b5cf6; }

/* MINI TIMELINE */
.timeline { background:#111118; border-top:1px solid #222; padding:8px 16px; display:flex; gap:8px; overflow-x:auto; flex-shrink:0; height:60px; }
.timeline img { height:44px; border-radius:4px; opacity:0.4; cursor:pointer; transition:all 0.2s; border:2px solid transparent; }
.timeline img:hover { opacity:0.8; }
.timeline img.active { opacity:1; border-color:#4a9eff; }
.timeline::-webkit-scrollbar { height: 6px; }
.timeline::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<div class="nav">
  <span class="title">📸 Josh Memorial</span>
  <a href="/">Browser</a>
  <a href="/builder">Builder</a>
  <a href="/player" class="active">Player</a>
  <a href="/faces">Face ID</a>
  <label style="font-size:11px;color:#666;margin-left:16px">Sequence:</label>
  <select id="seqSelect"></select>
  <button class="btn" id="btnLoadSeq">Load</button>
</div>

<div class="display" id="display">
  <div class="slide hidden" id="slideA"><img id="imgA"></div>
  <div class="slide hidden" id="slideB"><img id="imgB"></div>
  <div class="zone-left" onclick="seekRelative(-1)"></div>
  <div class="zone-right" onclick="seekRelative(1)"></div>
  <div class="slide-label" id="slideLabel"></div>
  
  <div class="safe-margins" id="safeMargins">
    <div class="action-safe"></div>
    <div class="title-safe"></div>
  </div>

  <div class="empty" id="emptyState"><div class="icon">▶</div><div>Select a sequence above to begin</div></div>
</div>

<div class="controls">
  <div class="controls-row">
    <div class="ctrl-info" id="slideCounter">0 / 0</div>
    <button class="ctrl-btn" onclick="seekRelative(-1)">⏮</button>
    <button class="ctrl-btn play" id="btnPlayPause" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="seekRelative(1)">⏭</button>
    <button class="ctrl-btn" onclick="stopPlayback()">⏹</button>
    <div class="progress-bar" id="progressBar" onclick="seekProgress(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="ctrl-time" id="timeDisplay">0:00 / 0:00</div>
  </div>
  <div class="controls-row2">
    <span class="section-name" id="sectionName"></span>
    <label><input type="checkbox" id="safeToggle" onchange="toggleSafe()"> Safe Margins</label>
    <label><input type="checkbox" id="pushToggle" checked> Ken Burns Push</label>
    <label>Transition:</label>
    <input type="range" id="transSlider" min="0.2" max="3" step="0.1" value="1">
    <span class="speed-val" id="transVal">1.0s</span>
  </div>
</div>

<div class="timeline" id="miniTimeline"></div>

<audio id="audioPlayer"></audio>

<script>
// --- STATE ---
let seq = null;
let currentIndex = -1;
let playing = false;
let activeSlide = 'A'; 
let speedMultiplier = 1;
let startTime = 0;
let requestID = null;
let totalSec = 0;

const audio = document.getElementById('audioPlayer');
const tl = document.getElementById('miniTimeline');

// --- INIT ---
async function init() {
  const seqs = await fetch('/api/sequences').then(r => r.json());
  const sel = document.getElementById('seqSelect');
  sel.innerHTML = '<option value="">— Select —</option>';
  for (const s of seqs) {
    sel.innerHTML += `<option value="${s.id}">${s.name} (${s.slides} slides)</option>`;
  }
  
  const params = new URLSearchParams(window.location.search);
  const seqId = params.get('seq');
  if (seqId) {
    sel.value = seqId;
    loadSequence(seqId);
  }
}

document.getElementById('btnLoadSeq').onclick = () => {
  const id = document.getElementById('seqSelect').value;
  if (id) loadSequence(id);
};

document.getElementById('seqSelect').onchange = function() {
  if (this.value) loadSequence(this.value);
};

async function loadSequence(id) {
  const resp = await fetch(`/api/sequences/${id}`);
  if (!resp.ok) return;
  seq = await resp.json();
  stopPlayback();
  
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('sectionName').textContent = seq.song 
    ? `${seq.name} — ♫ ${seq.song.title}`
    : seq.name;
    
  totalSec = seq.slides.reduce((s, sl) => s + (sl.duration_sec || seq.default_duration_sec || 5), 0);
  
  // Load Audio
  if (seq.song && seq.song.filename) {
    audio.src = `/music/${encodeURIComponent(seq.song.filename)}`;
  } else {
    audio.src = '';
  }
  
  buildTimeline();
  
  if (seq.slides.length > 0) {
    seekToTime(0);
    // Draw initial frame manually
    updateFrame(true); 
  }
}

function buildTimeline() {
  tl.innerHTML = '';
  seq.slides.forEach((sl, idx) => {
    const src = `/photos/${encodeURIComponent(sl.folder)}/${encodeURIComponent(sl.file)}`;
    const img = document.createElement('img');
    img.src = src;
    img.id = `thumb-${idx}`;
    
    // Calculate time to seek to
    let targetTime = 0;
    for(let i=0; i<idx; i++) {
        targetTime += (seq.slides[i].duration_sec || seq.default_duration_sec || 5);
    }
    img.onclick = () => {
        seekToTime(targetTime);
        if(!playing) {
           const wasPlaying = playing;
           playing = true; updateFrame(true); playing = wasPlaying;
        }
    };
    tl.appendChild(img);
  });
}

function toggleSafe() {
  const el = document.getElementById('safeMargins');
  el.classList.toggle('active', document.getElementById('safeToggle').checked);
}

// --- SLIDE DISPLAY ---
function showSlide(index) {
  if (!seq || index < 0 || index >= seq.slides.length || index === currentIndex) return;
  
  // Update timeline UI
  if(currentIndex >= 0) {
      const oldThumb = document.getElementById(`thumb-${currentIndex}`);
      if(oldThumb) oldThumb.classList.remove('active');
  }
  currentIndex = index;
  const slide = seq.slides[index];
  const src = `/photos/${encodeURIComponent(slide.folder)}/${encodeURIComponent(slide.file)}`;
  
  const curThumb = document.getElementById(`thumb-${index}`);
  if(curThumb) {
      curThumb.classList.add('active');
      curThumb.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  }
  
  const nextDiv = activeSlide === 'A' ? 'B' : 'A';
  const nextImg = document.getElementById(`img${nextDiv}`);
  const nextSlideDiv = document.getElementById(`slide${nextDiv}`);
  const curSlideDiv = document.getElementById(`slide${activeSlide}`);
  
  const transDur = parseFloat(document.getElementById('transSlider').value);
  nextSlideDiv.style.transition = `opacity ${transDur}s ease`;
  curSlideDiv.style.transition = `opacity ${transDur}s ease`;
  
  nextImg.src = src;
  nextSlideDiv.classList.add('active');
  nextSlideDiv.classList.remove('hidden');
  curSlideDiv.classList.remove('active');
  curSlideDiv.classList.add('hidden');
  
  // Handle Ken Burns
  const usePush = document.getElementById('pushToggle').checked;
  if (usePush) {
      nextSlideDiv.classList.add('push');
  } else {
      nextSlideDiv.classList.remove('push');
  }
  curSlideDiv.classList.remove('push');
  
  activeSlide = nextDiv;
}

// --- ENGINE ---
function updateFrame(force = false) {
  if (!force && (!playing || !seq)) return;
  
  const now = audio.src ? audio.currentTime : (Date.now() - startTime) / 1000;
  
  if (now >= totalSec) {
      pausePlayback();
      seekToTime(0);
      return;
  }
  
  let accumulated = 0;
  let targetIndex = 0;
  for (let i = 0; i < seq.slides.length; i++) {
    const dur = (seq.slides[i].duration_sec || seq.default_duration_sec || 5);
    if (now >= accumulated && now < accumulated + dur) {
      targetIndex = i;
      break;
    }
    accumulated += dur;
  }
  
  if (targetIndex !== currentIndex) {
    showSlide(targetIndex);
  }
  
  // Update progress bar
  const pct = Math.min(100, (now / totalSec) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeDisplay').textContent = `${formatTime(now)} / ${formatTime(totalSec)}`;
  document.getElementById('slideCounter').textContent = `${targetIndex + 1} / ${seq.slides.length}`;
  
  // Update overlay text
  const slide = seq.slides[targetIndex];
  if (slide) {
     const dur = (slide.duration_sec || seq.default_duration_sec || 5);
     const localTime = now - (accumulated - dur); 
     document.getElementById('slideLabel').textContent = `[${targetIndex + 1}] ${slide.file} (${localTime.toFixed(1)}s / ${dur.toFixed(1)}s)`;
  }
  
  if (playing) requestID = requestAnimationFrame(() => updateFrame(false));
}

function startPlayback() {
  if (!seq || seq.slides.length === 0) return;
  playing = true;
  document.getElementById('btnPlayPause').textContent = '⏸';
  if (audio.src) {
    audio.play();
  } else {
    // sync internal timer
    const now = (document.getElementById('progressFill').style.width || '0').replace('%','') / 100 * totalSec;
    startTime = Date.now() - (now * 1000);
  }
  updateFrame();
}

function pausePlayback() {
  playing = false;
  document.getElementById('btnPlayPause').textContent = '▶';
  if (audio.src) audio.pause();
  if (requestID) cancelAnimationFrame(requestID);
}

function stopPlayback() {
  pausePlayback();
  if (seq && seq.slides.length > 0) seekToTime(0);
}

function seekToTime(targetTime) {
  if (audio.src) {
    audio.currentTime = targetTime;
  } else {
    startTime = Date.now() - (targetTime * 1000);
  }
  const wasPlaying = playing;
  playing = true; 
  updateFrame(true);
  playing = wasPlaying;
}

function seekProgress(e) {
  if (!seq || seq.slides.length === 0) return;
  const bar = document.getElementById('progressBar');
  const pct = e.offsetX / bar.offsetWidth;
  seekToTime(pct * totalSec);
}

function seekRelative(dir) {
    if (!seq || currentIndex < 0) return;
    let target = currentIndex + dir;
    if(target < 0) target = 0;
    if(target >= seq.slides.length) target = seq.slides.length - 1;
    
    let targetTime = 0;
    for(let i=0; i<target; i++) {
        targetTime += (seq.slides[i].duration_sec || seq.default_duration_sec || 5);
    }
    seekToTime(targetTime);
}

document.getElementById('transSlider').oninput = function() {
  document.getElementById('transVal').textContent = parseFloat(this.value).toFixed(1) + 's';
};

// --- KEYBOARD ---
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); seekRelative(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); seekRelative(-1); }
  if (e.key === 'Escape') { e.preventDefault(); stopPlayback(); }
  if (e.key === 'f') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.getElementById('display').requestFullscreen();
  }
});

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

init();
</script>
</body>
</html>
