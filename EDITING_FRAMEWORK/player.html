<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josh Memorial — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#000; color:#e0e0e8; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* NAV */
.nav { background:#111118; border-bottom:1px solid #222; padding:6px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; z-index:10; }
.nav a { color:#888; text-decoration:none; font-size:12px; font-weight:500; padding:5px 12px; border-radius:6px; border:1px solid transparent; }
.nav a:hover { color:#ccc; background:#1a1a22; }
.nav a.active { color:#4a9eff; background:rgba(74,158,255,0.1); border-color:rgba(74,158,255,0.2); }
.nav .title { font-size:14px; font-weight:700; color:#e0e0e8; margin-right:auto; }
.nav select { background:#1a1a22; border:1px solid #333; color:#ccc; padding:4px 8px; border-radius:4px; font-size:11px; font-family:inherit; }
.nav .btn { padding:4px 10px; border-radius:6px; border:1px solid #333; background:#1a1a22; color:#ccc; font-size:11px; cursor:pointer; font-family:inherit; }
.nav .btn:hover { background:#252530; }

/* DISPLAY */
.display { flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#000; }
.display .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; transition:opacity 1s ease; }
.display .slide img { max-width:90%; max-height:90%; object-fit:contain; }
.display .slide.active { opacity:1; z-index:2; }
.display .slide.hidden { opacity:0; z-index:1; }

.display .empty { color:#444; text-align:center; }
.display .empty .icon { font-size:48px; margin-bottom:12px; }

/* Click zones */
.display .zone-left, .display .zone-right { position:absolute; top:0; bottom:80px; width:15%; z-index:5; cursor:pointer; }
.display .zone-left { left:0; }
.display .zone-right { right:0; }
.display .zone-left:hover, .display .zone-right:hover { background:rgba(255,255,255,0.02); }

/* Slide info overlay */
.slide-label { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); color:#666; font-size:11px; z-index:5; background:rgba(0,0,0,0.6); padding:4px 12px; border-radius:12px; }

/* CONTROLS */
.controls { background:#0a0a0f; border-top:1px solid #222; padding:12px 24px; display:flex; flex-direction:column; gap:8px; flex-shrink:0; z-index:10; }

.controls-row { display:flex; align-items:center; gap:12px; }

.progress-bar { flex:1; height:6px; background:#1a1a22; border-radius:3px; cursor:pointer; position:relative; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg, #4a9eff, #8b5cf6); border-radius:3px; transition:width 0.1s linear; }

.ctrl-btn { background:none; border:1px solid #333; color:#ccc; cursor:pointer; font-size:16px; padding:6px 12px; border-radius:6px; font-family:inherit; transition:all 0.15s; }
.ctrl-btn:hover { background:#1a1a22; border-color:#555; color:#fff; }
.ctrl-btn.play { font-size:20px; padding:8px 16px; background:rgba(74,158,255,0.1); border-color:rgba(74,158,255,0.3); color:#4a9eff; }
.ctrl-btn.play:hover { background:rgba(74,158,255,0.2); }

.ctrl-info { font-size:12px; color:#888; min-width:80px; }
.ctrl-info.right { text-align:right; }
.ctrl-time { font-size:13px; color:#aaa; font-variant-numeric:tabular-nums; min-width:100px; }

.controls-row2 { display:flex; align-items:center; gap:16px; justify-content:center; }
.controls-row2 label { font-size:11px; color:#555; }
.controls-row2 input[type=range] { width:80px; accent-color:#4a9eff; }
.controls-row2 .loop-toggle { display:flex; align-items:center; gap:4px; cursor:pointer; font-size:11px; color:#555; }
.controls-row2 .loop-toggle.active { color:#34d399; }
.controls-row2 .speed-val { font-size:11px; color:#888; min-width:30px; }
.controls-row2 .section-name { font-size:12px; color:#8b5cf6; }
</style>
</head>
<body>

<div class="nav">
  <span class="title">📸 Josh Memorial</span>
  <a href="/">Browser</a>
  <a href="/builder">Builder</a>
  <a href="/player" class="active">Player</a>
  <label style="font-size:11px;color:#666;margin-left:16px">Sequence:</label>
  <select id="seqSelect"></select>
  <button class="btn" id="btnLoadSeq">Load</button>
</div>

<div class="display" id="display">
  <div class="slide hidden" id="slideA"><img id="imgA"></div>
  <div class="slide hidden" id="slideB"><img id="imgB"></div>
  <div class="zone-left" onclick="prevSlide()"></div>
  <div class="zone-right" onclick="nextSlide()"></div>
  <div class="slide-label" id="slideLabel"></div>
  <div class="empty" id="emptyState"><div class="icon">▶</div><div>Select a sequence above to begin</div></div>
</div>

<div class="controls">
  <div class="controls-row">
    <div class="ctrl-info" id="slideCounter">0 / 0</div>
    <button class="ctrl-btn" onclick="prevSlide()">⏮</button>
    <button class="ctrl-btn play" id="btnPlayPause" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="nextSlide()">⏭</button>
    <button class="ctrl-btn" onclick="stopPlayback()">⏹</button>
    <div class="progress-bar" id="progressBar" onclick="seekProgress(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="ctrl-time" id="timeDisplay">0:00 / 0:00</div>
  </div>
  <div class="controls-row2">
    <span class="section-name" id="sectionName"></span>
    <label>Speed:</label>
    <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
    <span class="speed-val" id="speedVal">1.0×</span>
    <label>Transition:</label>
    <input type="range" id="transSlider" min="0.2" max="3" step="0.1" value="1">
    <span class="speed-val" id="transVal">1.0s</span>
    <div class="loop-toggle" id="loopToggle" onclick="toggleLoop()">🔁 Loop</div>
  </div>
</div>

<script>
// --- STATE ---
let seq = null;
let currentIndex = -1;
let playing = false;
let looping = false;
let playTimer = null;
let activeSlide = 'A'; // Which slide div is currently showing
let speedMultiplier = 1;

// --- INIT ---
async function init() {
  const seqs = await fetch('/api/sequences').then(r => r.json());
  const sel = document.getElementById('seqSelect');
  sel.innerHTML = '<option value="">— Select —</option>';
  for (const s of seqs) {
    sel.innerHTML += `<option value="${s.id}">${s.name} (${s.slides} slides)</option>`;
  }
  
  // Check URL params
  const params = new URLSearchParams(window.location.search);
  const seqId = params.get('seq');
  if (seqId) {
    sel.value = seqId;
    loadSequence(seqId);
  }
}

document.getElementById('btnLoadSeq').onclick = () => {
  const id = document.getElementById('seqSelect').value;
  if (id) loadSequence(id);
};

document.getElementById('seqSelect').onchange = function() {
  if (this.value) loadSequence(this.value);
};

async function loadSequence(id) {
  const resp = await fetch(`/api/sequences/${id}`);
  if (!resp.ok) return;
  seq = await resp.json();
  currentIndex = -1;
  stopPlayback();
  
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('sectionName').textContent = seq.song 
    ? `${seq.name} — ♫ ${seq.song.title} (${seq.song.duration})`
    : seq.name;
  
  if (seq.slides.length > 0) {
    showSlide(0);
  }
  updateControls();
}

// --- SLIDE DISPLAY ---
function showSlide(index) {
  if (!seq || index < 0 || index >= seq.slides.length) return;
  currentIndex = index;
  const slide = seq.slides[index];
  const src = `/photos/${encodeURIComponent(slide.folder)}/${encodeURIComponent(slide.file)}`;
  
  // Crossfade between A and B
  const nextDiv = activeSlide === 'A' ? 'B' : 'A';
  const nextImg = document.getElementById(`img${nextDiv}`);
  const nextSlideDiv = document.getElementById(`slide${nextDiv}`);
  const curSlideDiv = document.getElementById(`slide${activeSlide}`);
  
  // Set transition duration
  const transDur = parseFloat(document.getElementById('transSlider').value);
  nextSlideDiv.style.transition = `opacity ${transDur}s ease`;
  curSlideDiv.style.transition = `opacity ${transDur}s ease`;
  
  nextImg.src = src;
  nextSlideDiv.classList.add('active');
  nextSlideDiv.classList.remove('hidden');
  curSlideDiv.classList.remove('active');
  curSlideDiv.classList.add('hidden');
  
  activeSlide = nextDiv;
  
  document.getElementById('slideLabel').textContent = slide.file;
  updateControls();
}

// --- PLAYBACK ---
function togglePlay() {
  if (playing) {
    pausePlayback();
  } else {
    startPlayback();
  }
}

function startPlayback() {
  if (!seq || seq.slides.length === 0) return;
  if (currentIndex < 0) showSlide(0);
  playing = true;
  document.getElementById('btnPlayPause').textContent = '⏸';
  scheduleNext();
}

function pausePlayback() {
  playing = false;
  if (playTimer) clearTimeout(playTimer);
  playTimer = null;
  document.getElementById('btnPlayPause').textContent = '▶';
}

function stopPlayback() {
  pausePlayback();
  if (seq && seq.slides.length > 0) {
    showSlide(0);
  }
}

function scheduleNext() {
  if (!playing || !seq) return;
  const slide = seq.slides[currentIndex];
  const dur = (slide.duration_sec || seq.default_duration_sec || 5) * 1000;
  const adjusted = dur / speedMultiplier;
  
  playTimer = setTimeout(() => {
    if (currentIndex < seq.slides.length - 1) {
      showSlide(currentIndex + 1);
      scheduleNext();
    } else if (looping) {
      showSlide(0);
      scheduleNext();
    } else {
      pausePlayback();
    }
  }, adjusted);
}

function nextSlide() {
  if (!seq) return;
  const wasPlaying = playing;
  if (playing) pausePlayback();
  if (currentIndex < seq.slides.length - 1) {
    showSlide(currentIndex + 1);
  } else if (looping) {
    showSlide(0);
  }
  if (wasPlaying) startPlayback();
}

function prevSlide() {
  if (!seq) return;
  const wasPlaying = playing;
  if (playing) pausePlayback();
  if (currentIndex > 0) {
    showSlide(currentIndex - 1);
  }
  if (wasPlaying) startPlayback();
}

function toggleLoop() {
  looping = !looping;
  document.getElementById('loopToggle').className = looping ? 'loop-toggle active' : 'loop-toggle';
}

// --- PROGRESS ---
function seekProgress(e) {
  if (!seq || seq.slides.length === 0) return;
  const bar = document.getElementById('progressBar');
  const pct = e.offsetX / bar.offsetWidth;
  const targetIndex = Math.floor(pct * seq.slides.length);
  showSlide(Math.min(targetIndex, seq.slides.length - 1));
  if (playing) { clearTimeout(playTimer); scheduleNext(); }
}

// --- CONTROLS UPDATE ---
function updateControls() {
  if (!seq) return;
  const total = seq.slides.length;
  document.getElementById('slideCounter').textContent = `${currentIndex + 1} / ${total}`;
  
  const pct = total > 0 ? ((currentIndex + 1) / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  
  // Time
  const elapsed = seq.slides.slice(0, currentIndex + 1).reduce((s, sl) => s + (sl.duration_sec || 5), 0);
  const totalSec = seq.slides.reduce((s, sl) => s + (sl.duration_sec || 5), 0);
  document.getElementById('timeDisplay').textContent = `${formatTime(elapsed)} / ${formatTime(totalSec)}`;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// --- SPEED ---
document.getElementById('speedSlider').oninput = function() {
  speedMultiplier = parseFloat(this.value);
  document.getElementById('speedVal').textContent = speedMultiplier.toFixed(1) + '×';
};

document.getElementById('transSlider').oninput = function() {
  document.getElementById('transVal').textContent = parseFloat(this.value).toFixed(1) + 's';
};

// --- KEYBOARD ---
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape') { e.preventDefault(); stopPlayback(); }
  if (e.key === 'l') toggleLoop();
  if (e.key === 'f') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.getElementById('display').requestFullscreen();
  }
});

init();
</script>
</body>
</html>
